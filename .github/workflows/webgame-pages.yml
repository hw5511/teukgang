name: Deploy Workshop Pages

on:
  push:
    branches:
      - main
    paths:
      - webgame-workshop-pages/**
      - shorts-workshop/**
      - .github/workflows/webgame-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: workshop-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages site
        run: |
          mkdir -p _site
          cp -R webgame-workshop-pages/. _site/
          mkdir -p _site/shorts-workshop
          cp -R shorts-workshop/. _site/shorts-workshop/
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
